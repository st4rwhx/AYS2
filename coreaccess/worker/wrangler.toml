# AYS2 CORE ACCESS worker — Stripe checkout redirect + entitlement API.
name = "ays2-core-access"
main = "worker.js"
compatibility_date = "2026-07-01"

# KV namespace holding email → { tier, expiresAt } entitlements.
# Create it once:  npx wrangler kv namespace create ENTITLEMENTS
# then paste the generated id below.
[[kv_namespaces]]
binding = "ENTITLEMENTS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
# Stripe Payment Links (create them in the Stripe Dashboard — see README.md).
LINK_MONTHLY = "https://buy.stripe.com/REPLACE_monthly"
LINK_QUARTERLY = "https://buy.stripe.com/REPLACE_quarterly"
LINK_YEARLY = "https://buy.stripe.com/REPLACE_yearly"
LINK_LIFETIME = "https://buy.stripe.com/REPLACE_lifetime"

# Secret (never in this file):
#   npx wrangler secret put STRIPE_WEBHOOK_SECRET
