name: Remove imported/ directory

on:
  push:
    branches: [main]
    paths:
      - 'TRIGGER_REMOVE'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove imported/ directory
        run: |
          if [ ! -d "imported" ]; then
            echo "imported/ directory does not exist, nothing to do"
            exit 0
          fi
          git config user.name "st4rwhx"
          git config user.email "psycowrlds@gmail.com"
          git rm -r imported/ --quiet
          git commit -m "Remove imported/ directory (old fork snapshot)

This directory contained thousands of files from an old fork snapshot
that are no longer needed. Removed via GitHub Actions."
          git push
